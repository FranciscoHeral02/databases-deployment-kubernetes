# 1. NAMESPACE (Aislamiento para la base de datos)
apiVersion: v1
kind: Namespace
metadata:
  name: databases

---
# 2. DOPPLER SECRET (Sincronización de credenciales)
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: db-secrets-sync
  namespace: databases
spec:
  tokenSecretRef:
    name: doppler-token-auth
    namespace: doppler-operator-system # Namespace donde vive tu token de servicio
  managedSecret:
    name: db-secrets  # Nombre del secreto que generará automáticamente
    type: Opaque

---
# 3. PERSISTENCIA (Disco para los datos de Postgres)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: databases
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi # Ajusta según la capacidad de tu VPS

---
# 4. POSTGRESQL (Motor de base de datos)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: databases
spec:
  replicas: 1 # Obligatorio 1 para evitar corrupción en volúmenes RWO
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        envFrom:
        - secretRef:
            name: db-secrets # Secreto gestionado por Doppler
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# 5. SERVICE INTERNO (DNS interno para PgBouncer)
apiVersion: v1
kind: Service
metadata:
  name: postgres-internal
  namespace: databases
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
# 6. PGBOUNCER (Pooler de conexiones)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: databases
spec:
  replicas: 2 # Alta disponibilidad para conexiones
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:latest
        env:
        - name: DB_HOST
          value: "postgres-internal"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_DB
        - name: POOL_MODE
          value: "transaction"
        - name: AUTH_TYPE
          value: "any"
        ports:
        - containerPort: 6432

---
# 7. SERVICE LOAD BALANCER (Acceso directo por puerto 6432)
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-external
  namespace: databases
spec:
  type: LoadBalancer # K3s asignará automáticamente la IP de tu VPS
  selector:
    app: pgbouncer
  ports:
    - protocol: TCP
      port: 6432       # Puerto externo directo
      targetPort: 6432 # Puerto interno del contenedor
