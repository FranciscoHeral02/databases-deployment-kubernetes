name: Despliegue de Infraestructura Manual

on:
  workflow_dispatch:
    inputs:
      capa:
        description: '¿Qué capa de la infraestructura deseas desplegar?'
        required: true
        type: choice
        options:
          - 01-namespaces
          - 02-red-y-seguridad
          - 03-bases-de-datos

permissions:
  contents: write

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      # 1. Generamos el token de la GitHub App para saltar la protección de la rama
      - name: Generar Token de la GitHub App
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 2. Descargamos el código usando el token de la App
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          token: ${{ steps.app-token.outputs.token }} 

      # 3. Conectamos con el clúster K3s
      - name: Configurar Contexto de Kubernetes
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 4. Desplegamos la carpeta seleccionada en el formulario
      - name: Aplicar Capa Seleccionada
        run: |
          echo "🚀 Aplicando la capa: ${{ inputs.capa }}/"
          kubectl apply -f ${{ inputs.capa }}/ --recursive
          
      # 5. Verificamos la salud (solo si decidiste desplegar la base de datos)
      - name: Verificar Salud (Solo para DB)
        if: inputs.capa == '03-bases-de-datos'
        run: |
          echo "Verificando salud de la base de datos..."
          kubectl rollout status deployment/postgres-db -n databases --timeout=60s
          kubectl rollout status deployment/pgbouncer -n databases --timeout=60s

      # 6. Sincronizamos la rama actual con master (Merge automático)
      - name: Mantener Master Actualizada
        if: github.ref_name != 'master'
        run: |
          echo "Sincronizando la rama actual ($GITHUB_REF_NAME) hacia master..."
          
          # Configurar credenciales del bot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          
          git fetch origin
          
          # Nos movemos a master y la actualizamos con lo que esté en la nube
          git checkout master
          git pull origin master
          
          # Fusionamos la rama de release/infra que disparó el workflow
          git merge origin/$GITHUB_REF_NAME --no-ff -m "chore: merge de $GITHUB_REF_NAME tras deploy de infra exitoso [skip ci]"
          
          # Empujamos los cambios (la GitHub App tiene permiso de bypass en el Ruleset)
          git push origin master
