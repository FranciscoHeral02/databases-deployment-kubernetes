apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: databases
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:latest
        env:
        - name: DB_HOST
          value: "postgres-internal"
        - name: DB_PORT
          value: "5432"
        - name: LISTEN_PORT
          value: "6432"  
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_DB
        - name: POOL_MODE
          value: "transaction"
        - name: AUTH_TYPE
          value: "scram-sha-256"
        ports:
        - containerPort: 6432
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-external
  namespace: databases
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - protocol: TCP
      port: 6432
      targetPort: 6432